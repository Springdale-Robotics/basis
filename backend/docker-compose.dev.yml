# Development compose file - use with: docker-compose -f docker-compose.dev.yml up

services:
  postgres:
    image: postgres:16-alpine
    container_name: homemanager-postgres-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=homemanager
      - POSTGRES_PASSWORD=devpassword
      - POSTGRES_DB=homemanager
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homemanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: homemanager-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: PgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: homemanager-pgadmin-dev
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@homemanager.local
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - pgadmin-dev-data:/var/lib/pgadmin
    depends_on:
      - postgres

  # Optional: Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: homemanager-redis-commander-dev
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis

  # Ollama for local AI vision processing (VLM-LLM pipeline)
  ollama:
    image: ollama/ollama:0.5.7
    container_name: homemanager-ollama-dev
    ports:
      - "11434:11434"
    volumes:
      - ollama-dev-models:/root/.ollama
    environment:
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    mem_limit: 8g
    memswap_limit: 16g  # Allows 8GB swap on top of 8GB RAM
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # GPU support (NVIDIA) - uncomment when Ollama GPU bug is fixed
    # Note: Ollama 0.15.x has a llama-sampling.cpp assertion bug with llava on GPU
    # Using 0.5.7 which is more stable for vision models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # VLM + LLM service for image parsing (two-stage pipeline)
  # Stage 1: llava:7b reads images (handles handwriting, stylized fonts)
  # Stage 2: qwen2.5:7b structures output into clean JSON
  vlm-llm:
    build:
      context: ../services/vlm-llm
      dockerfile: Dockerfile
    container_name: homemanager-vlm-llm-dev
    ports:
      - "8010:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - VLM_MODEL=minicpm-v
      - VLM_MODEL_CPU=moondream
      - LLM_MODEL=qwen2.5:7b
    depends_on:
      - ollama
    mem_limit: 1g
    memswap_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres-dev-data:
  redis-dev-data:
  pgadmin-dev-data:
  ollama-dev-models:
