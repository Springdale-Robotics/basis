name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same branch / PR to save CI time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund
        working-directory: backend

      - name: Lint
        run: npm run lint
        working-directory: backend

      # Backend typecheck has pre-existing Drizzle-schema issues that the dev
      # workflow tolerates (`tsx` is the runtime). Skipping here until the
      # schema generics are sorted out.

  frontend:
    name: Frontend lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: frontend
